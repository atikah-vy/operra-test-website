<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-primary: #0B1F3A;
      --brand-accent: #3B82F6;
      --brand-hover: #2563EB;
      --text-primary: #0F172A;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --bg-subtle: #F8FAFC;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      flex-wrap: wrap;
      padding: 2rem;
    }

    /* ── MODAL CARD ── */
    .modal-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      box-shadow: 0 4px 32px rgba(15,23,42,0.08);
    }

    .modal-logo {
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .modal-logo img {
      height: 120px;
      width: auto;
      object-fit: contain;
      display: inline-block;
    }

    /* ── TABS ── */
    .modal-tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 2rem;
      background: var(--bg-subtle);
    }

    .modal-tab {
      flex: 1;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s ease;
      user-select: none;
    }

    .modal-tab.active {
      background: #fff;
      color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(15,23,42,0.08);
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.375rem;
    }

    .optional {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-left: 4px;
    }

    input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text-primary);
      background: #fff;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus {
      border-color: var(--brand-accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: var(--brand-accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: background .15s ease;
    }
    .btn-submit:hover { background: var(--brand-hover); }

    .modal-footer-text {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 1.25rem;
    }

    .modal-footer-text a {
      color: var(--brand-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── LABEL ── */
    .preview-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>

  <!-- SIGN IN -->
  <div>
    <p class="preview-label">Sign In</p>
    <div class="modal-card">
      <div class="modal-logo"><img src="brand_logo_page/Brand LOGO.jpg" alt="Operra" /></div>

      <div class="modal-tabs">
        <div class="modal-tab active">Sign in</div>
        <div class="modal-tab">Create account</div>
      </div>

      <form>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <button class="btn-submit" type="button">Sign in</button>
      </form>

      <p class="modal-footer-text">
        No account? <a href="#">Create one free</a>
      </p>
    </div>
  </div>

  <!-- SIGN UP -->
  <div>
    <p class="preview-label">Create Account</p>
    <div class="modal-card">
      <div class="modal-logo"><img src="brand_logo_page/Brand LOGO.jpg" alt="Operra" /></div>

      <div class="modal-tabs">
        <div class="modal-tab">Sign in</div>
        <div class="modal-tab active">Create account</div>
      </div>

      <form>
        <div class="form-group">
          <label>Full name</label>
          <input type="text" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label>Work email</label>
          <input type="email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Company <span class="optional">optional</span></label>
          <input type="text" placeholder="Acme Inc." />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Min. 8 characters" />
        </div>
        <button class="btn-submit" type="button">Create free account</button>
      </form>

      <p class="modal-footer-text">
        Already have an account? <a href="#">Sign in</a>
      </p>
    </div>
  </div>

</body>
</html>
